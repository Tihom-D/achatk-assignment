<!DOCTYPE html>
<html>
<head>
    <title>Apply</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        input, textarea {
            display: block;
            margin-bottom: 10px;
            width: 300px;
            padding: 5px;
        }
        button {
            padding: 8px 15px;
            background-color: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h1>Apply Now</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
</form>

<a href="{% url 'home' %}">Back to List</a>

</body>
</html>
